<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Live News Feed Aggregator — stay informed with the latest headlines across categories." />
  <title>LiveNews — Aggregator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <h1 class="site-title">LiveNews</h1>
    <nav class="category-nav" aria-label="Category filter">
      <button class="cat-btn active" data-category="general">All</button>
      <button class="cat-btn" data-category="business">Business</button>
      <button class="cat-btn" data-category="technology">Tech</button>
      <button class="cat-btn" data-category="science">Science</button>
      <button class="cat-btn" data-category="health">Health</button>
      <button class="cat-btn" data-category="sports">Sports</button>
      <button class="cat-btn" data-category="entertainment">Entertainment</button>
    </nav>
  </header>

  <main class="content-area">
    <aside class="search-panel">
      <form id="search-form" class="search-form" autocomplete="off">
        <label for="search-input" class="sr-only">Search news</label>
        <input
          type="search"
          id="search-input"
          class="search-input"
          placeholder="Search headlines…"
          required
        />
        <button type="submit" class="search-btn" aria-label="Submit search">Search</button>
      </form>
    </aside>

    <section class="articles-section">
      <div id="spinner" class="spinner-container" aria-live="polite" hidden>
        <div class="spinner"></div>
        <span class="spinner-label">Loading latest news…</span>
      </div>

      <div id="articles-grid" class="articles-grid" role="feed" aria-busy="false">
        <!-- Article cards rendered by js/ui.js -->
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 LiveNews Aggregator. Powered by <a href="https://newsapi.org" target="_blank" rel="noopener">NewsAPI</a>.</p>
  </footer>

  <script type="module" src="js/api.js"></script>
  <script type="module" src="js/ui.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
